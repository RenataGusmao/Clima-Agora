<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Clima</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Consulta de Clima</h1>
        <p>Busque o clima da Cidade do Recife</p>
    </header>

    <main>

        <section class="busca">
            <input type="text" id="cidade" placeholder="Digite o nome da cidade">
            <button onclick="buscarClima()">Buscar</button>
        </section>

        <section id="resultado">

            <h2 id="nomeCidade"></h2>

            <p>Temperatura: <span id="temperatura"></span></p>
            <p>Clima: <span id="descricao"></span></p>
            <p>Umidade: <span id="umidade"></span></p>

        </section>
       
        <section class="extra">
            <h3>Detalhes do clima</h3>

        <div class="info">
            <p>🌡️ Temperatura atual</p>
            <span id="tempExtra"></span>
        </div>

        <div class="info">
          <p>💨 Velocidade do vento</p>
          <span id="ventoExtra"></span>
        </div>

        <div class="info">
            <p>🧭 Direção do vento</p>
            <span id="direcaoExtra"></span>
         </div>
         </section>
    </main>

    <script src="script.js"></script>

</body>

</html>
