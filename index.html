<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Clima</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="overlay">
            <h1>Consulta de Clima</h1>
            <p>Consulte o clima de qualquer cidade do Brasil</p>
        </div>
    </header>

    <main>

        <section class="acao">
            <input type="text" id="cidade" placeholder="Digite a cidade">
            <button onclick="buscarClima()">Buscar</button>
        </section>

        <section class="card-principal">
            <h2 id="nomeCidade">---</h2>
            <p class="temperatura-grande" id="temperatura">-- °C</p>
            <p id="descricao">Digite uma cidade para visualizar o clima</p>
        </section>

        <section class="detalhes-clima">
            <div class="card-detalhe">
                <h3>Vento</h3>
                <p id="ventoExtra">-- km/h</p>
            </div>

            <div class="card-detalhe">
                <h3>Direção</h3>
                <p id="direcaoExtra">--</p>
            </div>

            <div class="card-detalhe">
                <h3>Horário</h3>
                <p id="horarioClima">--:--</p>
            </div>

            <div class="card-detalhe">
                <h3>Temperatura</h3>
                <p id="tempExtra">-- °C</p>
            </div>
        </section>
    </main>

    <footer>
        <p>Dados fornecidos por Open-Meteo.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
