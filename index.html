<!DOCTYPE html>
<html lang="pt-br">

<header>
    <div class="overlay">
        <h1>Consulta de Clima</h1>
        <p>Clima atual da cidade do Recife</p>
    </div>
</header>

<main>
    <section class="acao">
        <button onclick="buscarClima()">Atualizar clima</button>
    </section>

    <section class="card-principal">
        <h2 id="nomeCidade">Recife</h2>
        <p class="temperatura-grande" id="temperatura">-- °C</p>
        <p id="descricao">Carregue os dados do clima</p>
    </section>

    <section class="detalhes-clima">
        <div class="card-detalhe">
            <h3>Vento</h3>
            <p id="ventoExtra">-- km/h</p>
        </div>

        <div class="card-detalhe">
            <h3>Direção</h3>
            <p id="direcaoExtra">--</p>
        </div>

        <div class="card-detalhe">
            <h3>Horário</h3>
            <p id="horarioClima">--:--</p>
        </div>

        <div class="card-detalhe">
            <h3>Temperatura</h3>
            <p id="tempExtra">-- °C</p>
        </div>
    </section>
</main>

<footer>
    <p>Dados fornecidos por Open-Meteo.</p>
</footer>

    <script src="script.js"></script>

</body>

</html>
